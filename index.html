<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#123a36">
  <meta name="description" content="水準測量の観測値を音声やキーボードで入力できる、無料の現場向けWeb野帳です。">
  <title>水準ボイス野帳</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./css/style.css?v=3">
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <div>
        <p class="eyebrow">Ezアイズ Survey Tools</p>
        <h1>水準ボイス野帳</h1>
      </div>
      <div class="brand-links">
        <a href="https://ez-survey.sakura.ne.jp/" target="_blank" rel="noopener noreferrer">株式会社アイズ測量</a>
        <button id="supportOpenBtn" class="support-button" type="button">♡ 応援</button>
      </div>
    </div>

    <div class="sheet-tabs" role="tablist" aria-label="野帳シート">
      <button id="outSheetTab" class="sheet-tab active" type="button" role="tab" aria-selected="true" data-sheet="out">往路</button>
      <button id="backSheetTab" class="sheet-tab" type="button" role="tab" aria-selected="false" data-sheet="back">復路</button>
    </div>

    <section class="summary" aria-label="観測集計">
      <div class="summary-card">
        <span>往路 高低差</span>
        <strong id="outDiff">—</strong>
      </div>
      <div class="summary-card">
        <span>復路 高低差</span>
        <strong id="backDiff">—</strong>
      </div>
      <div id="closureCard" class="summary-card closure pending">
        <span>往復閉合差</span>
        <strong id="closure">—</strong>
        <em id="closureJudgement">判定待ち</em>
      </div>
      <label class="tolerance-card">
        <span>許容値</span>
        <span class="tolerance-input"><input id="closureTolerance" type="number" min="0" step="1" inputmode="numeric"><b>mm</b></span>
      </label>
    </section>

    <div class="toolbar" aria-label="操作">
      <button id="addRowsBtn" type="button">＋ 行追加</button>
      <button id="deleteRowBtn" type="button">－ 行削除</button>
      <button id="saveBtn" type="button">上書き保存</button>
      <button id="csvBtn" type="button">CSV出力</button>
      <button id="clearBtn" class="danger-outline" type="button">全消去</button>
    </div>
  </header>

  <main>
    <div id="notice" class="notice" role="alert" hidden></div>
    <div class="sheet-heading">
      <strong id="activeSheetName">往路シート</strong>
      <span id="rowCount">200行</span>
    </div>

    <div class="table-wrap" tabindex="0" aria-label="水準野帳。右側の項目は横方向にスクロールできます">
      <table id="notebook">
        <thead>
          <tr>
            <th class="sticky-no">No.</th>
            <th class="sticky-point">点名</th>
            <th>後視 BS</th>
            <th>前視 FS</th>
            <th>高低差</th>
            <th>既知/仮標高</th>
            <th>距離</th>
            <th>備考</th>
          </tr>
        </thead>
        <tbody id="notebookBody"></tbody>
      </table>
    </div>
  </main>

  <div class="voice-dock">
    <button id="voiceBtn" type="button">🎤 音声入力</button>
    <span id="selectedCellLabel">入力セルを選択してください</span>
    <div id="voiceStatus" class="sr-only" aria-live="polite"></div>
  </div>

  <footer>
    <p>無料公開・無保証の現場支援ツールです。重要な成果は必ず正式な方法で確認してください。</p>
    <p>制作：<a href="https://ez-survey.sakura.ne.jp/" target="_blank" rel="noopener noreferrer">株式会社アイズ測量</a></p>
  </footer>

  <dialog id="supportDialog">
    <form method="dialog">
      <button class="dialog-close" aria-label="閉じる">×</button>
      <p class="eyebrow">水準ボイス野帳</p>
      <h2>無料公開を応援する</h2>
      <p>役に立ったら、OFUSEで応援していただけるとうれしいです。</p>
      <div class="dialog-actions">
        <a class="support-link" href="https://ofuse.me/f475dafe/letter" target="_blank" rel="noopener noreferrer">OFUSEで応援する</a>
        <a href="https://ez-survey.sakura.ne.jp/" target="_blank" rel="noopener noreferrer">公式ホームページ</a>
      </div>
    </form>
  </dialog>

  <noscript>このアプリの利用にはJavaScriptを有効にしてください。</noscript>
  <script type="module" src="./js/app.js?v=3"></script>
</body>
</html>
